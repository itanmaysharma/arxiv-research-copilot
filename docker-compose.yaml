services:
  api:
    build: .
    container_name: apiserver
    env_file:
      - .env
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 25s
    depends_on:
      postgres:
        condition: service_healthy
      opensearch:
        condition: service_healthy
      ollama:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - curator_net

  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - curator_net

  opensearch:
    image: opensearchproject/opensearch:2.19.0
    container_name: opensearch
    environment:
      discovery.type: single-node
      bootstrap.memory_lock: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: ${OPENSEARCH_PASSWORD}
      DISABLE_SECURITY_PLUGIN: "true"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
    restart: unless-stopped
    healthcheck:
      test:
        - CMD-SHELL
        - curl -fsS http://localhost:9200 >/dev/null || exit 1
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 35s
    volumes:
      - os_data:/usr/share/opensearch/data
    networks:
      - curator_net

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.19.0
    container_name: opensearch_dashboards
    environment:
      OPENSEARCH_HOSTS: '["http://opensearch:9200"]'
      DISABLE_SECURITY_DASHBOARDS_PLUGIN: "true"
    ports:
      - "5601:5601"
    restart: unless-stopped
    healthcheck:
      test:
        - CMD-SHELL
        - curl -fsS http://localhost:5601/api/status >/dev/null || exit 1
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 35s
    depends_on:
      opensearch:
        condition: service_healthy
    networks:
      - curator_net

  airflow-init:
    image: apache/airflow:3.0.2
    container_name: airflow_init
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://arxiv:arxivpass@postgres:5432/airflow_meta
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__API_AUTH__JWT_SECRET: "airflow-local-jwt-secret-change-me"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - curator_net
    command: >
      bash -c "airflow db migrate"

  airflow-webserver:
    image: apache/airflow:3.0.2
    container_name: airflow_webserver
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://arxiv:arxivpass@postgres:5432/airflow_meta
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://airflow-webserver:8080/execution/
      AIRFLOW__API_AUTH__JWT_SECRET: "airflow-local-jwt-secret-change-me"
    command: api-server
    ports:
      - "8080:8080"
    restart: unless-stopped
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/v2/monitor/health', timeout=5)"
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 30s
    volumes:
      - ./airflow/dags:/opt/airflow/dags
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    networks:
      - curator_net

  airflow-scheduler:
    image: apache/airflow:3.0.2
    container_name: airflow_scheduler
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://arxiv:arxivpass@postgres:5432/airflow_meta
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://airflow-webserver:8080/execution/
      AIRFLOW__API_AUTH__JWT_SECRET: "airflow-local-jwt-secret-change-me"
    command: scheduler
    restart: unless-stopped
    volumes:
      - ./airflow/dags:/opt/airflow/dags
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      airflow-webserver:
        condition: service_healthy
    networks:
      - curator_net

  airflow-dag-processor:
    image: apache/airflow:3.0.2
    container_name: airflow_dag_processor
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://arxiv:arxivpass@postgres:5432/airflow_meta
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://airflow-webserver:8080/execution/
      AIRFLOW__API_AUTH__JWT_SECRET: "airflow-local-jwt-secret-change-me"
    command: dag-processor
    restart: unless-stopped
    volumes:
      - ./airflow/dags:/opt/airflow/dags
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      airflow-webserver:
        condition: service_healthy
    networks:
      - curator_net

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - curator_net

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - curator_net


volumes:
  pg_data:
  os_data:
  ollama_data:

networks:
  curator_net:
    driver: bridge
